{% extends "base.html" %}
{% block title %}500 Server Error — HiTV{% endblock %}
{% block page_title %}Server Error{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:40px auto;">
  <div class="card-body" style="text-align:center;padding:48px 32px;">
    <div style="font-size:56px;margin-bottom:16px;">⚠️</div>
    <h2 style="font-size:20px;color:#1a3a5c;margin-bottom:8px;">Something went wrong</h2>
    <p style="color:#596778;font-size:14px;margin-bottom:24px;">
      An unexpected error occurred. Please try again.
    </p>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">← Back to Dashboard</a>
  </div>
</div>
{% endblock %}
